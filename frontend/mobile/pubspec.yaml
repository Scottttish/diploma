name: asar_field_worker
description: Field service worker application for ASAR operational ecosystem.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Secure local storage for JWT tokens and credentials
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.2.4

  # Image picker for mandatory verification photos on job completion
  image_picker: ^1.1.2

  # JSON serialization code generation
  json_annotation: ^4.9.0

  # Map placeholder (OpenStreetMap via flutter_map)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Date/time formatting
  intl: ^0.20.2

  # Connectivity check for offline awareness
  connectivity_plus: ^6.0.3

  # Cache manager for attachment images
  cached_network_image: ^3.3.1

  # UUID generation for optimistic local message IDs
  uuid: ^4.4.0

  # GPS location for route screen
  geolocator: ^14.0.2

  # Open Google Maps / 2GIS / Yandex Maps
  url_launcher: ^6.3.0

  # Weekly bar chart in analytics screen
  fl_chart: ^0.69.0

  # Location permission dialogs
  permission_handler: ^11.3.1

  # App version for settings screen
  package_info_plus: ^8.0.0

  # Theme persistence (dark mode)
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  mocktail: ^1.0.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/logo.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: IBMPlexSans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Regular.ttf
        - asset: assets/fonts/IBMPlexSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSans-Bold.ttf
          weight: 700
